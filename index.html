<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Cosmere Timeline</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --gold:    #c9a84c;
  --gold-d:  #7a6230;
  --bg:      #0d0d18;
  --surface: #1a1a2e;
  --text:    #d4cfc4;
  --muted:   #6b6660;
  --ff-h:    'Cinzel', serif;
  --ff-b:    'Crimson Pro', Georgia, serif;
}
html, body { min-height: 100%; background: var(--bg); color: var(--text); font-family: var(--ff-b); }

/* ── HOVER OVERLAY ── */
#overlay {
  position: fixed; inset: 0;
  display: flex; align-items: center; justify-content: center; gap: 56px;
  padding: 56px;
  background: rgba(10,10,22,0);
  pointer-events: none;
  z-index: 9999;
  transition: background .22s;
}
#ov-backdrop {
  position: absolute; inset: 0;
  z-index: 0;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
#ov-img, #ov-info { position: relative; z-index: 1; }
#overlay.on { background: rgba(10,10,22,.84); }  /* pointer-events stays none */

#ov-img {
  width: 300px; height: 450px; flex-shrink: 0;
  border-radius: 8px; overflow: hidden;
  border: 2px solid var(--gold-d);
  background: var(--surface);
  opacity: 0; transform: scale(.88);
  transition: opacity .25s, transform .25s;
}
#overlay.on #ov-img { opacity: 1; transform: scale(1); }
#ov-img img { width: 100%; height: 100%; object-fit: cover; object-position: center center; display: block; }
#ov-fall {
  width: 100%; height: 100%;
  display: none; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 24px;
  font-family: var(--ff-h); font-size: 16px; line-height: 1.45;
  overflow-wrap: anywhere; word-break: break-word; hyphens: auto;
  text-shadow: 0 2px 12px rgba(0,0,0,.6);
  background:
    linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.28)),
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.12));
}

#ov-info {
  max-width: 420px;
  opacity: 0; transform: translateX(20px);
  transition: opacity .25s .08s, transform .25s .08s;
}
#overlay.on #ov-info { opacity: 1; transform: translateX(0); }
#ov-title  { font-family: var(--ff-h); font-size: 35px; color: var(--gold); margin-bottom: 8px; line-height: 1.2; }
#ov-original { font-size: 20px; color: rgba(212,207,196,.82); font-style: italic; margin-bottom: 10px; line-height: 1.35; }
#ov-planet { font-size: 20px; margin-bottom: 4px; letter-spacing: .5px; }
#ov-year   { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 20px; }
#ov-rule   { width: 48px; height: 1px; background: var(--gold-d); margin-bottom: 20px; }
#ov-blurb  { font-size: 18px; line-height: 1.8; }

@keyframes slideLine { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
.ov-line { display: block; opacity: 0; animation: slideLine .3s forwards; }

/* ── PAGE ── */
.page { width: 100%; max-width: 1920px; margin: 0 auto; }

.header { text-align: center; padding: 28px 24px 12px; border-bottom: 1px solid rgba(201,168,76,.15); background: var(--bg); position: relative; z-index: 200; }
.header h1 {
  font-family: var(--ff-h); font-size: 36px; color: var(--gold); letter-spacing: 8px; margin-bottom: 6px;
  text-shadow: 0 0 1px rgba(201,168,76,.9), 0 0 8px rgba(201,168,76,.28);
}
.header p  { font-size: 16px; color: var(--muted); letter-spacing: 2px; font-style: italic; }

.site-footer {
  border-top: 1px solid rgba(201,168,76,.14);
  padding: 14px 16px 22px;
  text-align: center;
  color: rgba(212,207,196,.72);
  font-size: 12px;
  letter-spacing: .2px;
}

/* ── LEGEND ── */
.legend {
  display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
  padding: 10px 24px 8px; border-bottom: 1px solid rgba(255,255,255,.05);
  background: var(--bg); position: relative; z-index: 200;
}

/* All Worlds button */
.leg-all {
  font-family: var(--ff-h); font-size: 11px; letter-spacing: .8px;
  cursor: pointer; padding: 7px 16px; border-radius: 24px;
  border: 1px solid var(--gold-d); color: var(--gold-d);
  background: transparent;
  transition: all .2s; user-select: none;
}
.leg-all:hover { color: var(--gold); border-color: var(--gold); }
.leg-all.active {
  color: #0d0d18;
  background: var(--gold);
  border-color: var(--gold);
  box-shadow: 0 0 14px rgba(201,168,76,.28);
}

/* Planet pill — solid background for readability */
.leg-item {
  display: flex; align-items: center; gap: 7px;
  font-family: var(--ff-h); font-size: 11px; letter-spacing: .6px;
  cursor: pointer; padding: 7px 14px; border-radius: 24px;
  border: 1.5px solid transparent;
  background: rgba(255,255,255,.06);
  color: var(--text);
  transition: all .2s; user-select: none;
}
.leg-item:hover { background: rgba(255,255,255,.12); border-color: rgba(255,255,255,.2); }

/* Active: solid fill with planet color, dark text for contrast */
.leg-item.active {
  background: var(--pc);
  border-color: var(--pc);
  color: #0d0d18;         /* dark text on coloured bg */
  box-shadow: 0 0 14px -3px var(--pc);
}
.leg-item.active .leg-dot { background: rgba(0,0,0,.4) !important; }
.leg-item.faded { opacity: .2; }

.leg-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; transition: transform .2s; }
.leg-item.active .leg-dot { transform: scale(1.35); }


/* ── SCROLL AREA ── */
.tl-outer {
  overflow-x: auto; overflow-y: visible;
  padding: 8px 80px 0;
  cursor: grab;
  scrollbar-width: none;
  -webkit-overflow-scrolling: touch;
  touch-action: auto;
}
.tl-outer::-webkit-scrollbar { display: none; }
.tl-outer:active { cursor: grabbing; }

.tl-canvas { position: relative; height: 860px; overflow: visible; margin-top: -99px; }
.canvas-pad { display: inline-block; height: 1px; flex-shrink: 0; pointer-events: none; }

/* ── AXIS ── */
.axis {
  position: absolute; left: 0; right: 0; top: 410px; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(201,168,76,.45) 2%, rgba(201,168,76,.45) 98%, transparent);
  pointer-events: none;
}

/* Era label — below axis */
.era-lbl {
  position: absolute; top: 434px;
  font-family: var(--ff-h); font-size: 13px; color: var(--gold-d); letter-spacing: 0.8px;
  transform: translateX(-50%); white-space: nowrap; pointer-events: none;
}

/* Year marker — above axis */
.yr-mark {
  position: absolute; top: 358px;
  font-family: var(--ff-h); font-size: 12px; color: rgba(201,168,76,.65); letter-spacing: 0.4px;
  transform: translateX(-50%); white-space: nowrap; pointer-events: none;
  padding-top: 0;
}

.tick { position: absolute; top: 401px; width: 1px; height: 18px; background: rgba(201,168,76,.22); pointer-events: none; }

/* ── AXIS DOT ── */
.adot {
  position: absolute; top: 404px;
  width: 12px; height: 12px; border-radius: 50%;
  transform: translateX(-50%);
  border: 2px solid var(--bg); z-index: 5;
  transition: opacity .3s;
}
.adot.faded { opacity: .07; }

/* ── BOOK ── */
.bk {
  position: absolute; width: 110px;
  display: flex; flex-direction: column; align-items: center;
  cursor: pointer; z-index: 10; overflow: visible;
  transition: opacity .3s;
}
.bk.faded { opacity: .07; pointer-events: none; }
.bk { z-index: 10; }
.cw:hover { transform: scale(1.08); box-shadow: 0 6px 28px rgba(0,0,0,.7); z-index: 100; cursor: pointer; }

.stem { width: 1.5px; opacity: .4; flex-shrink: 0; align-self: center; }

.cw {
  width: 108px; height: 162px; border-radius: 4px;
  border: none;
  background: var(--surface); position: relative; flex-shrink: 0; overflow: hidden;
  transition: transform .2s ease, box-shadow .2s ease, border-color .2s ease;
}
.cw img {
  width: 100%; height: 100%;
  object-fit: cover; object-position: center center;
  display: block; border: none; outline: none;
}
.cw-band { position: absolute; bottom: 0; left: 0; right: 0; height: 4px; pointer-events: none; }
.cfall {
  width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 12px 10px 14px;
  text-align: center; font-size: 13px; font-family: var(--ff-h); line-height: 1.28;
  overflow-wrap: anywhere; word-break: break-word; hyphens: auto;
  text-shadow: 0 1px 8px rgba(0,0,0,.5);
  background:
    linear-gradient(180deg, rgba(255,255,255,.02), rgba(0,0,0,.16)),
    radial-gradient(circle at 50% 35%, rgba(255,255,255,.05), transparent 60%);
}
.cfall .fall-tag {
  font-size: 8px;
  opacity: .6;
  margin-bottom: 7px;
  letter-spacing: .9px;
}
.cfall .fall-title,
#ov-fall .fall-title {
  max-width: 100%;
}

/* ── SLIDER ── */
.sl-wrap { display: flex; align-items: center; gap: 18px; padding: 10px 80px 10px; background: var(--bg); position: relative; z-index: 200; border-bottom: 1px solid rgba(201,168,76,.1); }
.sl-lbl  { font-family: var(--ff-h); font-size: 11px; color: var(--gold-d); letter-spacing: 1.5px; white-space: nowrap; }
.sl-btn  { cursor: pointer; padding: 4px 8px; border-radius: 4px; transition: color .15s, background .15s; user-select: none; }
.sl-btn:hover { color: var(--gold); background: rgba(201,168,76,.1); }
.sl-nav-btn { display: inline-flex; align-items: center; gap: 7px; }
.sl-nav-btn .btn-text { line-height: 1; }
.sl-nav-btn .btn-arrow {
  width: 8px; height: 8px;
  border-top: 2px solid currentColor;
  border-right: 2px solid currentColor;
  display: inline-block;
  opacity: .95;
}
.sl-nav-btn .btn-arrow.left  { transform: rotate(-135deg); }
.sl-nav-btn .btn-arrow.right { transform: rotate(45deg); }

input[type=range].slider {
  flex: 1; -webkit-appearance: none; appearance: none; height: 3px;
  background: linear-gradient(90deg, var(--gold) var(--p,0%), rgba(255,255,255,.1) var(--p,0%));
  border-radius: 3px; outline: none; cursor: pointer;
  --eclipse-phase: 0;
  --moon-x: 18%;
  --moon-alpha: 0;
  --corona-alpha: .26;
  --thumb-bg:
    radial-gradient(circle at var(--moon-x) 50%, rgba(8,8,16,var(--moon-alpha)) 0 31%, rgba(10,10,20,var(--moon-alpha)) 32% 42%, transparent 43%),
    radial-gradient(circle at 50% 50%, rgba(255,247,214,.98) 0 18%, rgba(255,226,132,.97) 19% 39%, rgba(230,191,74,.93) 40% 58%, rgba(201,168,76,var(--corona-alpha)) 59% 73%, rgba(201,168,76,0) 74%),
    radial-gradient(circle at 35% 35%, rgba(255,255,240,.32) 0 10%, transparent 11%);
  --thumb-border: 2px solid var(--bg);
  --thumb-shadow:
    0 0 0 1px rgba(255,224,139,.18),
    0 0 10px rgba(201,168,76,.68),
    0 0 18px rgba(201,168,76,.26);
}
input[type=range].slider::-webkit-slider-thumb {
  -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%;
  background: var(--thumb-bg); border: var(--thumb-border);
  box-shadow: var(--thumb-shadow); cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s, background .15s;
}
input[type=range].slider::-moz-range-thumb {
  width: 16px; height: 16px; border-radius: 50%;
  background: var(--thumb-bg); border: var(--thumb-border);
  box-shadow: var(--thumb-shadow); cursor: pointer;
  transition: transform .15s, box-shadow .15s, border-color .15s, background .15s;
}
input[type=range].slider:hover::-webkit-slider-thumb {
  transform: scale(1.4);
  box-shadow:
    0 0 0 1px rgba(255,224,139,.24),
    0 0 14px rgba(201,168,76,.82),
    0 0 24px rgba(201,168,76,.34);
}

/* ── LANGUAGE SELECTOR ── */
.lang-selector {
  position: static;
  display: flex; gap: 8px;
  align-items: center;
  justify-content: center;
  background: rgba(13, 13, 24, 0.95);
  padding: 8px;
  margin: 0 auto 10px;
  width: fit-content;
  border-radius: 6px;
  border: 1px solid rgba(201, 168, 76, 0.3);
}
.lang-btn {
  font-family: var(--ff-h); font-size: 12px; letter-spacing: 1px;
  cursor: pointer; padding: 10px 16px; border-radius: 4px;
  border: 2px solid #c9a84c; color: #c9a84c;
  background: transparent;
  transition: all .2s; user-select: none;
  outline: none;
  display: inline-block;
  min-width: 50px;
  text-align: center;
  white-space: nowrap;
  flex-shrink: 0;
  font-weight: bold;
}
.lang-btn:hover { 
  color: #fff; 
  border-color: #fff; 
  background: rgba(201,168,76,.2);
  box-shadow: 0 0 8px rgba(201,168,76,.4);
}
.lang-btn.active { 
  background: #c9a84c; 
  color: #0d0d18;
  border-color: #c9a84c;
  box-shadow: 0 0 12px rgba(201,168,76,.6);
}

/* ═══════════════════════════════════════
   MOBILE / TOUCH  (≤ 600px)
   iPhone 16e = 393px logical width
═══════════════════════════════════════ */
@media (max-width: 600px) {

  /* Header */
  .header { padding: 16px 12px 8px; }
  .header h1 { font-size: 27.5px; letter-spacing: 4px; margin-bottom: 4px; }
  .header p  { font-size: 12px; letter-spacing: 1px; }

  /* Legend — compact scrollable row */
  .legend {
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: visible;
    justify-content: flex-start;
    padding: 8px 12px 6px;
    gap: 7px;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }
  .legend::-webkit-scrollbar { display: none; }
  .leg-all, .leg-item {
    font-size: 10.8px;
    padding: 5px 10px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .leg-dot { width: 7px; height: 7px; }

  /* Slider */
  .sl-wrap { padding: 8px 14px; gap: 10px; }
  .sl-lbl  { font-size: 10.8px; letter-spacing: 1px; }
  .sl-nav-btn { gap: 5px; }
  .sl-nav-btn .btn-arrow {
    width: 10px; height: 10px;
    border-top-width: 2.5px;
    border-right-width: 2.5px;
  }
  input[type=range].slider::-webkit-slider-thumb { width: 22px; height: 22px; }
  input[type=range].slider::-moz-range-thumb     { width: 22px; height: 22px; }

  /* Timeline outer — full width, tighter padding */
  .tl-outer { padding: 8px 20px 0; -webkit-overflow-scrolling: touch; }

  /* Overlay — stack vertically on mobile */
  #overlay {
    flex-direction: column;
    gap: 16px;
    padding: 16px;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
  }
  #ov-img  {
    width: min(75vw, 240px);
    height: min(112.5vw, 360px);
    flex-shrink: 0;
  }
  #ov-info {
    max-width: 100%;
    text-align: center;
  }
  #ov-title  { font-size: 25px; }
  #ov-original { font-size: 17px; margin-bottom: 8px; }
  #ov-planet { font-size: 17px; }
  #ov-year   { font-size: 11px; margin-bottom: 12px; }
  #ov-rule   { margin: 0 auto 12px; }
  #ov-blurb  { font-size: 14px; line-height: 1.6; }

  /* Language selector mobile */
  .lang-selector {
    position: static;
    margin: 8px auto 6px;
    gap: 4px;
    width: fit-content;
  }
  .lang-btn { font-size: 9px; padding: 5px 8px; min-width: 35px; }
  .site-footer { font-size: 11px; padding: 12px 12px 20px; }
}

/* Tap highlight suppression (iOS) */
* { -webkit-tap-highlight-color: transparent; }

/* ── SLIDER PROJECTION LINE ── */
/* Fixed vertical gold line that aligns with the slider thumb's canvas position */
#proj-line {
  position: absolute;       /* inside .tl-canvas */
  top: 0; bottom: 0;
  width: 2px;
  --ray-rgb: 201,168,76;
  background: linear-gradient(
    to bottom,
    transparent 0%,
    rgba(var(--ray-rgb),0) 15%,
    rgba(var(--ray-rgb),.55) 40%,
    rgba(var(--ray-rgb),.9) calc(var(--ay) - 2px),
    rgb(var(--ray-rgb)) var(--ay),
    rgba(var(--ray-rgb),.4) calc(var(--ay) + 4px),
    rgba(var(--ray-rgb),0) 75%,
    transparent 100%
  );
  pointer-events: none;
  z-index: 50;
  --ay: 45%;   /* axis position as % of canvas height, set by JS */
}

/* Ray burst emitted from the projection line when crossing a book */
#proj-line::before {
  content: '';
  position: absolute;
  top: var(--ay);
  left: 50%;
  width: 32px;
  height: 30px;
  transform: translate(-50%, -50%) scaleY(0.35);
  opacity: 0;
  background: linear-gradient(
    to bottom,
    rgba(var(--ray-rgb), 0) 0%,
    rgba(var(--ray-rgb), .75) 50%,
    rgba(var(--ray-rgb), 0) 100%
  );
  border-radius: 999px;
  filter: blur(2px) drop-shadow(0 0 7px rgba(var(--ray-rgb), .6));
}

#proj-line.ray-pulse::before {
  animation: projRayPulse .55s cubic-bezier(.22,.61,.36,1);
}

@keyframes projRayPulse {
  0%   { opacity: 0;   width: 34px; height: 24px;  transform: translate(-50%, -50%) scaleY(0.25); }
  22%  { opacity: .96; width: 32px; height: 150px; transform: translate(-50%, -50%) scaleY(1); }
  60%  { opacity: .62; width: 14px; height: 235px; transform: translate(-50%, -50%) scaleY(1.04); }
  100% { opacity: 0;   width: 5px;  height: 305px; transform: translate(-50%, -50%) scaleY(1.08); }
}

/* Glowing diamond at the axis intercept */
#proj-line::after {
  content: '';
  position: absolute;
  top: var(--ay);
  left: 50%;
  transform: translate(-50%, -50%) rotate(45deg);
  width: 10px; height: 10px;
  background: rgb(var(--ray-rgb));
  box-shadow: 0 0 10px 3px rgba(var(--ray-rgb), .7);
  transition: top .05s linear;
}

/* Era labels and year marks: smooth scale transition */
.era-lbl, .yr-mark {
  transition: transform .2s ease, color .2s ease, text-shadow .2s ease, filter .2s ease;
  transform-origin: center center;
  will-change: transform;
}

@keyframes timelineTextPop {
  0%   { transform: translateX(-50%) scale(1);   filter: brightness(1); }
  45%  { transform: translateX(-50%) scale(1.62); filter: brightness(1.18); }
  100% { transform: translateX(-50%) scale(1.48); filter: brightness(1.08); }
}
.era-lbl.near {
  transform: translateX(-50%) translateY(-2px) scale(1.48);
  color: var(--gold);
  text-shadow: 0 0 14px rgba(201,168,76,.68);
  filter: drop-shadow(0 0 8px rgba(201,168,76,.5));
  animation: timelineTextPop .26s cubic-bezier(.2,.75,.25,1);
}
.yr-mark.near {
  transform: translateX(-50%) translateY(-2px) scale(1.52);
  color: rgba(201,168,76,1);
  text-shadow: 0 0 12px rgba(201,168,76,.76);
  filter: drop-shadow(0 0 8px rgba(201,168,76,.55));
  animation: timelineTextPop .26s cubic-bezier(.2,.75,.25,1);
}

/* Tick also lights up */
.tick.near {
  background: rgba(201,168,76,.7);
  box-shadow: 0 0 6px rgba(201,168,76,.5);
}

/* Book cover "popping" when crossed by the projection line */
.bk.near .cw {
  transform: scale(1.12);
  box-shadow: 0 0 22px 4px rgba(201,168,76,.35), 0 8px 32px rgba(0,0,0,.7);
  border-color: rgba(201,168,76,.5) !important;
  z-index: 90;
  transition: transform .25s ease, box-shadow .25s ease, border-color .25s ease;
}
/* Keep hover scale dominant over near scale */
.bk.near .cw:hover {
  transform: scale(1.2);
}
/* Stem glows */
.bk.near .stem {
  opacity: .75;
  filter: drop-shadow(0 0 4px currentColor);
  transition: opacity .25s ease, filter .25s ease;
}
</style>
</head>
<body>

<div id="overlay">
  <div id="ov-backdrop"></div>
  <div id="ov-img">
    <img id="ov-img-el" src="" alt="">
    <div id="ov-fall"></div>
  </div>
  <div id="ov-info">
    <div id="ov-title"></div>
    <div id="ov-original"></div>
    <div id="ov-planet"></div>
    <div id="ov-year"></div>
    <div id="ov-rule"></div>
    <div id="ov-blurb"></div>
  </div>
</div>

<div class="page">
  <header class="header">
    <div class="lang-selector" id="lang-selector">
      <button class="lang-btn active" data-lang="en" title="English">EN</button>
      <button class="lang-btn" data-lang="uk" title="Українська">UK</button>
    </div>
    <h1>THE COSMERE</h1>
    <p>Shardworld Timeline · approximate in-universe chronology</p>
  </header>
  <nav class="legend" id="legend" aria-label="Planet filter"></nav>
  <div class="sl-wrap">
    <span class="sl-lbl sl-btn sl-nav-btn" id="btn-earlier" title="Jump to start">
      <span class="btn-arrow left" aria-hidden="true"></span>
      <span class="btn-text">EARLIER</span>
    </span>
    <input type="range" class="slider" id="slider" min="0" max="100" value="0" aria-label="Timeline position">
    <span class="sl-lbl sl-btn sl-nav-btn" id="btn-later" title="Jump to end">
      <span class="btn-text">LATER</span>
      <span class="btn-arrow right" aria-hidden="true"></span>
    </span>
  </div>
  <div class="tl-outer" id="outer">

let currentLang = localStorage.getItem('cosmere-lang') || 'en';

function t(key) {
  // Try with current language suffix for Ukrainian
  if (currentLang === 'uk' && TRANSLATIONS.uk[key + '_uk']) {
    return TRANSLATIONS.uk[key + '_uk'];
  }
  return TRANSLATIONS[currentLang]?.[key] || TRANSLATIONS.en[key] || BOOK_TITLE_EN[key] || TRANSLATIONS.uk[key] || key;
}

function setLanguage(lang) {
  if (!TRANSLATIONS[lang]) return;
  currentLang = lang;
  localStorage.setItem('cosmere-lang', lang);
  applyTranslations();
  updateLanguageSelector();
  refreshBookCovers();
}

function applyTranslations() {
  // Static UI elements
  document.title = t('pageTitle');
  document.querySelector('.header h1').textContent = t('title');
  document.querySelector('.header p').textContent = t('subtitle');
  const footerRights = document.getElementById('footer-rights');
  if (footerRights) footerRights.textContent = t('rightsNotice');
  document.documentElement.lang = currentLang;
  
  // Dynamic buttons
  const allBtn = document.querySelector('.leg-all');
  if (allBtn) allBtn.textContent = t('allWorlds');
  
  const btnEarlier = document.getElementById('btn-earlier');
  if (btnEarlier) {
    const btnEarlierText = btnEarlier.querySelector('.btn-text');
    if (btnEarlierText) btnEarlierText.textContent = t('earlier');
    btnEarlier.title = t('jumpToStart');
  }
  
  const btnLater = document.getElementById('btn-later');
  if (btnLater) {
    const btnLaterText = btnLater.querySelector('.btn-text');
    if (btnLaterText) btnLaterText.textContent = t('later');
    btnLater.title = t('jumpToEnd');
  }
  
  const slider = document.getElementById('slider');
  if (slider) slider.setAttribute('aria-label', t('timelinePosition'));
  
  const legend = document.getElementById('legend');
  if (legend) legend.setAttribute('aria-label', t('planetFilter'));
  
  // Rebuild legend items with new labels and preserve active filter state.
  rebuildLegend();
  setFilter(activePlanet);
  
  // Rebuild era labels on canvas
  rebuildEras();
}

function updateLanguageSelector() {
  const buttons = document.querySelectorAll('.lang-btn');
  buttons.forEach(btn => {
    const lang = btn.getAttribute('data-lang');
    if (lang === currentLang) {
      btn.classList.add('active');
    } else {
      btn.classList.remove('active');
    }
  });
}

function getCanonicalBookTitle(titleKey) {
  return BOOK_TITLE_EN[titleKey] || titleKey;
}

function getOriginalBookTitle(titleKey) {
  return BOOK_TITLE_EN[titleKey] || t(titleKey);
}

function getLocalizedBookCoverUrl(book, lang = currentLang) {
  const canonicalTitle = getCanonicalBookTitle(book.titleKey);
  return LOCALIZED_COVER_URLS[lang]?.[canonicalTitle] ?? null;
}

function getBookCoverUrl(book) {
  const canonicalTitle = getCanonicalBookTitle(book.titleKey);
  const localizedUrl = getLocalizedBookCoverUrl(book);
  if (localizedUrl) {
    return localizedUrl;
  }
  return COVER_URL[canonicalTitle] ?? null;
}

/** 
 * Given a loaded <img>, find the tight bounding box of non-background content
 * and apply it via CSS background-image + background-position/size on the container.
 * threshold: pixels within this luminance distance of the corner colour are "background".
 */
function trimCoverImage(img, container) {
  try {
    const w = img.naturalWidth, h = img.naturalHeight;
    if (!w || !h) return;

    const offscreen = new OffscreenCanvas(w, h);
    const ctx = offscreen.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const data = ctx.getImageData(0, 0, w, h).data;

    // Sample all 4 corners to find the background colour
    function px(x, y) {
      const i = (y * w + x) * 4;
      return [data[i], data[i+1], data[i+2], data[i+3]];
    }
    const corners = [px(0,0), px(w-1,0), px(0,h-1), px(w-1,h-1)];

    // Average the corners to get background colour estimate
    let br = 0, bg = 0, bb = 0;
    for (const [r,g,b] of corners) { br+=r; bg+=g; bb+=b; }
    br = Math.round(br/4); bg = Math.round(bg/4); bb = Math.round(bb/4);

    // Only trim if background is light-ish (luminance > 160)
    // Dark backgrounds (real cover edges) should not be trimmed
    const bgLum = 0.299*br + 0.587*bg + 0.114*bb;
    if (bgLum < 160) return; // dark background = full-bleed cover, skip

    const THRESH = 40;
    function isBg(x, y) {
      const [r,g,b,a] = px(x, y);
      if (a < 20) return true;
      return Math.sqrt((r-br)**2 + (g-bg)**2 + (b-bb)**2) < THRESH;
    }

    let top = 0, bot = h-1, lft = 0, rgt = w-1;

    outer: for (let y = 0; y < h; y++)
      for (let x = 0; x < w; x++)
        if (!isBg(x,y)) { top = y; break outer; }

    outer: for (let y = h-1; y >= 0; y--)
      for (let x = 0; x < w; x++)
        if (!isBg(x,y)) { bot = y; break outer; }

    outer: for (let x = 0; x < w; x++)
      for (let y = top; y <= bot; y++)
        if (!isBg(x,y)) { lft = x; break outer; }

    outer: for (let x = w-1; x >= 0; x--)
      for (let y = top; y <= bot; y++)
        if (!isBg(x,y)) { rgt = x; break outer; }

    const cropW = rgt - lft + 1, cropH = bot - top + 1;
    const pad = Math.max(lft/w, top/h, (w-1-rgt)/w, (h-1-bot)/h);
    if (pad < 0.04) return; // less than 4% padding — not worth trimming

    // Apply trim: hide img, use background-image with correct pixel offsets
    const scaleX = container.offsetWidth  / cropW;
    const scaleY = container.offsetHeight / cropH;
    img.style.cssText += ';opacity:0;position:absolute;pointer-events:none';
    container.style.backgroundImage    = `url("${img.src}")`;
    container.style.backgroundSize    = `${(w * scaleX).toFixed(1)}px ${(h * scaleY).toFixed(1)}px`;
    container.style.backgroundPosition = `-${(lft * scaleX).toFixed(1)}px -${(top * scaleY).toFixed(1)}px`;
    container.style.backgroundRepeat   = 'no-repeat';
  } catch(e) {
    // CORS or OffscreenCanvas not available — leave image as-is
  }
}

function createCoverImage(book, container) {
  const img = document.createElement('img');
  img.crossOrigin = 'anonymous';
  img.alt = t(book.titleKey);
  img.loading = 'lazy';
  img.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:center center;display:block';
  img.addEventListener('load', () => trimCoverImage(img, container));
  img.addEventListener('error', function h() {
    this.removeEventListener('error', h);
    this.remove();
    if (!container.querySelector('.cfall')) {
      container.insertBefore(fallback(t(book.titleKey), PLANETS[book.planet].color, false), container.querySelector('.cw-band'));
    }
  });
  return img;
}

function refreshBookCovers() {
  document.querySelectorAll('.cw').forEach(cw => {
    const idx = parseInt(cw.dataset.bookIdx, 10);
    if (Number.isNaN(idx)) return;

    const book = BOOKS[idx];
    const planet = PLANETS[book.planet];
    const url = getBookCoverUrl(book);
    const band = cw.querySelector('.cw-band');
    const existingImg = cw.querySelector('img');
    const existingFallback = cw.querySelector('.cfall');

    if (book.upcoming || !url) {
      if (existingImg) existingImg.remove();
      if (!existingFallback) {
        cw.insertBefore(fallback(t(book.titleKey), planet.color, !!book.upcoming), band);
      } else {
        existingFallback.style.color = planet.color;
        existingFallback.innerHTML = book.upcoming
          ? `<div class="fall-tag">${t('forthcoming')}</div><div class="fall-title">${t(book.titleKey)}</div>`
          : `<div class="fall-title">${t(book.titleKey)}</div>`;
      }
      if (book.upcoming) {
        cw.style.borderStyle = 'dashed';
        cw.style.opacity = '0.6';
      }
      return;
    }

    if (existingFallback) existingFallback.remove();
    cw.style.borderStyle = '';
    cw.style.opacity = '';
    cw.style.backgroundImage = '';
    cw.style.backgroundSize = '';
    cw.style.backgroundPosition = '';
    cw.style.backgroundRepeat = '';

    if (existingImg) {
      existingImg.alt = t(book.titleKey);
      existingImg.style.cssText = 'width:100%;height:100%;object-fit:cover;object-position:center center;display:block';
      if (existingImg.src !== url) {
        existingImg.src = url;
      } else {
        trimCoverImage(existingImg, cw);
      }
    } else {
      const img = createCoverImage(book, cw);
      img.src = url;
      cw.insertBefore(img, band);
    }
  });

  if (overlay.classList.contains('on') && currentBook) {
    const openBook = currentBook;
    currentBook = null;
    showOverlay(openBook, PLANETS[openBook.planet], getBookCoverUrl(openBook));
  }
}

for (const b of BOOKS) {
  if (!planetCenterX[b.planet]) planetCenterX[b.planet] = [];
  planetCenterX[b.planet].push(b.x);
}
for (const pid in planetCenterX) {
  const xs = planetCenterX[pid];
  planetCenterX[pid] = xs.reduce((a, v) => a + v, 0) / xs.length;
}

function scrollToPlanet(pid) {
  const cx = planetCenterX[pid] ?? TOTAL_W / 2;
  // With side padding: to center canvas-x=cx, set scrollLeft=cx
  const targetScroll = cx;
  sliderTarget = Math.max(0, Math.min(targetScroll, outer.scrollWidth - outer.clientWidth));
  scheduleFrame();
}

const legItems = {};

function rebuildLegend() {
  // Clear existing legend items
  legendEl.innerHTML = '';
  
  const allBtnNew = Object.assign(document.createElement('button'), {
    className: 'leg-all', textContent: t('allWorlds')
  });
  allBtnNew.addEventListener('click', () => setFilter(null));
  legendEl.appendChild(allBtnNew);
  
  // Rebuild planet items
  for (const [id, p] of Object.entries(PLANETS)) {
    const el = document.createElement('button');
    el.className = 'leg-item';
    el.style.setProperty('--pc', p.color);
    el.innerHTML = `<span class="leg-dot" style="background:${p.color}88"></span>${getPlanetLabel(id)}`;
    el.addEventListener('click', () => {
      const toggling = activePlanet === id;
      setFilter(toggling ? null : id);
      if (!toggling) scrollToPlanet(id);
    });
    legendEl.appendChild(el);
    legItems[id] = el;
  }
}

// Initial legend build - single call
rebuildLegend();
setFilter(null);

function setFilter(pid) {
  activePlanet = pid;
  const allBtn = legendEl.querySelector('.leg-all');
  if (allBtn) {
    allBtn.style.opacity = pid ? '0.45' : '1';
    allBtn.classList.toggle('active', !pid);
  }
  for (const [id, el] of Object.entries(legItems)) {
    el.classList.toggle('active', id === pid);
    el.classList.toggle('faded', !!pid && id !== pid);
  }
  document.querySelectorAll('.bk').forEach(el =>
    el.classList.toggle('faded', !!pid && el.dataset.planet !== pid));
  document.querySelectorAll('.adot').forEach(el =>
    el.classList.toggle('faded', !!pid && el.dataset.planet !== pid));
}

// If a planet filter is active, clicking/tapping outside the legend clears it.
document.addEventListener('pointerdown', (e) => {
  if (!activePlanet) return;
  const target = e.target;
  if (!(target instanceof Element)) return;
  if (target.closest('#legend')) return; // keep normal legend interactions
  setFilter(null);
}, { passive: true });

// Initial build
rebuildEras();

// Resolve same-side cover overlaps: books whose centers are closer than
// MIN_GAP on the same axis side will visually overlap. 108px is the cover
// width; add 16px buffer so the hover scale(1.08) doesn't cause overlap either.
(function resolveBookOverlaps() {
  const MIN_GAP = 124; // 108px cover + 16px buffer for hover scale
  [true, false].forEach(side => {
    const group = BOOKS
      .filter(b => b.above === side)
      .sort((a, b) => a.x - b.x);
    for (let i = 1; i < group.length; i++) {
      const prev = group[i - 1];
      const curr = group[i];
      if (curr.x - prev.x < MIN_GAP) curr.x = prev.x + MIN_GAP;
    }
  });
})();

for (const b of BOOKS) {
  const p   = PLANETS[b.planet];
  const url = getBookCoverUrl(b);

  // Dot
  const dot = document.createElement('div');
  dot.className = 'adot';
  dot.style.cssText = `left:${b.x}px;background:${p.color}`;
  dot.dataset.planet = b.planet;
  canvas.appendChild(dot);

  // Wrapper
  const bk = document.createElement('div');
  bk.className   = 'bk';
  bk.dataset.planet = b.planet;
  bk.dataset.x = b.x;  // canvas-x center for projection hit-test
  bk.style.left  = (b.x - 54) + 'px';  // half of 108px cover width

  const stem = document.createElement('div');
  stem.className = 'stem';
  stem.style.cssText = `height:${b.stemH}px;background:${p.color}`;

  const cw = document.createElement('div');
  cw.className = 'cw';
  cw.style.borderColor = p.color + '66';

  if (url && !b.upcoming) {
    const img = createCoverImage(b, cw);
    img.src = url;
    cw.appendChild(img);
  } else {
    cw.appendChild(fallback(t(b.titleKey), p.color, !!b.upcoming));
    if (b.upcoming) { cw.style.borderStyle = 'dashed'; cw.style.opacity = '0.6'; }
  }

  const band = document.createElement('div');
  band.className = 'cw-band'; band.style.background = p.color;
  cw.appendChild(band);

  if (b.above) {
    bk.style.top = (AXIS_Y - b.stemH - 162 - 6) + 'px';
    bk.append(cw, stem);
  } else {
    bk.style.top = AXIS_Y + 'px';
    bk.append(stem, cw);
  }

  // Store book data on the cover element for hit-testing
  cw.dataset.bookIdx = String(BOOKS.indexOf(b));
  bk.dataset.bookIdx = String(BOOKS.indexOf(b));

  canvas.appendChild(bk);
}

function fallback(title, color, upcoming) {
  const d = document.createElement('div');
  d.className = 'cfall'; d.style.color = color;
  d.innerHTML = upcoming
    ? `<div class="fall-tag">${t('forthcoming')}</div><div class="fall-title">${title}</div>`
    : `<div class="fall-title">${title}</div>`;
  return d;
}

// OVERLAY  — pointer-events:none so it never blocks covers
// Detection via document.mousemove + elementFromPoint
// ─────────────────────────────────────────────
const overlay   = document.getElementById('overlay');
const ovImgWrap = document.getElementById('ov-img');
const ovImgEl   = document.getElementById('ov-img-el');
const ovFall    = document.getElementById('ov-fall');
const ovTitle   = document.getElementById('ov-title');
const ovOriginal = document.getElementById('ov-original');
const ovPlanet  = document.getElementById('ov-planet');
const ovYear    = document.getElementById('ov-year');
const ovBlurb   = document.getElementById('ov-blurb');
const backdrop  = document.getElementById('ov-backdrop');

let currentBook = null;   // which book is currently shown
let hideTimer   = null;

// Backdrop click dismisses (backdrop has pointer-events:auto)
backdrop.addEventListener('click', () => hideOverlay());

// Token to cancel stale async image loads when switching books quickly
function isTouchDevice() {
  return window.matchMedia('(hover: none) and (pointer: coarse)').matches;
}

let loadToken = 0;

function resetImgState() {
  // Kill any pending onload/onerror and clear the src so stale callbacks never fire
  ovImgEl.onload  = null;
  ovImgEl.onerror = null;
  ovImgEl.src     = '';
  // Clear trim CSS
  ovImgWrap.style.backgroundImage    = '';
  ovImgWrap.style.backgroundSize     = '';
  ovImgWrap.style.backgroundPosition = '';
  // Reset inline styles set by trimCoverImage
  ovImgEl.style.opacity  = '1';
  ovImgEl.style.position = 'relative';
  ovImgEl.style.cssText  = '';
}

function showOverlay(b, p, url) {
  if (currentBook === b && overlay.classList.contains('on')) return;
  currentBook = b;
  clearTimeout(hideTimer);

  // Always fully reset image state first — prevents stale covers showing
  resetImgState();

  if (url && !b.upcoming) {
    // Capture token so stale onload from previous book is ignored
    const token = ++loadToken;
    ovImgEl.style.display = 'block';
    ovFall.style.display  = 'none';
    ovImgEl.alt           = t(b.titleKey);
    ovImgEl.crossOrigin   = 'anonymous';
    ovImgEl.onload  = () => { if (loadToken === token) trimCoverImage(ovImgEl, ovImgWrap); };
    ovImgEl.onerror = () => {
      if (loadToken !== token) return;
      ovImgEl.style.display = 'none';
      ovFall.style.display  = 'flex';
      ovFall.style.color    = p.color;
      ovFall.innerHTML      = `<div class="fall-title">${t(b.titleKey)}</div>`;
    };
    ovImgEl.src = url;
  } else {
    // No cover — hide image completely, show fallback card
    ovImgEl.style.display = 'none';
    ovFall.style.display  = 'flex';
    ovFall.style.color    = p.color;
    ovFall.innerHTML = b.upcoming
      ? `<div class="fall-tag" style="font-size:12px;margin-bottom:10px">${t('forthcoming')}</div><div class="fall-title" style="font-size:20px">${t(b.titleKey)}</div>`
      : `<div class="fall-title" style="font-size:18px">${t(b.titleKey)}</div>`;
  }

  ovImgWrap.style.borderColor = p.color + '99';
  // ── Text always matches the book being hovered ──
  ovTitle.textContent  = t(b.titleKey);
  if (currentLang !== 'en') {
    ovOriginal.textContent = `(${getOriginalBookTitle(b.titleKey)})`;
    ovOriginal.style.display = 'block';
  } else {
    ovOriginal.textContent = '';
    ovOriginal.style.display = 'none';
  }
  ovPlanet.textContent = getPlanetLabel(b.planet);
  ovPlanet.style.color = p.color;
  ovYear.textContent   = t(b.yearKey);
  const words  = t(b.blurbKey).split(' ');
  const chunks = [];
  for (let i = 0; i < words.length; i += 6) chunks.push(words.slice(i, i + 6).join(' '));
  ovBlurb.innerHTML = chunks.map((c, i) =>
    `<span class="ov-line" style="animation-delay:${i * 55}ms">${c}</span>`).join('');
  overlay.classList.add('on');
  if (isTouchDevice()) document.body.style.overflow = 'hidden';
}

function hideOverlay() {
  overlay.classList.remove('on');
  document.body.style.overflow = '';
  currentBook = null;
}

// ── CURSOR TRACKING ──
// Since overlay is pointer-events:none it never blocks the cursor.
// We track cursor position and hit-test cover elements directly.
document.addEventListener('mousemove', e => {
  // Temporarily ensure overlay doesn't intercept — it shouldn't, but be safe
  const el = document.elementFromPoint(e.clientX, e.clientY);
  if (!el) return;

  // Check if cursor is over a .cw element (cover card)
  const cw = el.closest('.cw');
  if (cw) {
    const idx = parseInt(cw.dataset.bookIdx, 10);
    if (!isNaN(idx)) {
      const b = BOOKS[idx];
      const p = PLANETS[b.planet];
      const url = getBookCoverUrl(b);
      clearTimeout(hideTimer);
      showOverlay(b, p, url);
    }
    return;
  }

  // Cursor is NOT over any cover — hide after short delay
  // (allows moving cursor smoothly without flicker)
  clearTimeout(hideTimer);
  hideTimer = setTimeout(hideOverlay, 80);
});

const sliderEl = document.getElementById('slider');

// ── State ──
let dragging      = false, dragX0 = 0, scrollX0 = 0;
let sliderDriving = false; // slider is actively being dragged by user
let rafPending    = false; // rAF frame already scheduled
// Target scroll set by slider; -1 = not driven by slider this frame
let sliderTarget  = -1;

function cancelAutoScrollTarget() {
  sliderTarget = -1;
  lerpActive = false;
}

// ── Mouse drag on timeline ──
outer.addEventListener('mousedown', e => {
  dragging = true; dragX0 = e.pageX - outer.offsetLeft; scrollX0 = outer.scrollLeft;
  outer.style.userSelect = 'none';
  cancelAutoScrollTarget();
});
document.addEventListener('mouseup', () => { dragging = false; outer.style.userSelect = ''; });
outer.addEventListener('mousemove', e => {
  if (!dragging) return;
  e.preventDefault();
  outer.scrollLeft = scrollX0 - (e.pageX - outer.offsetLeft - dragX0);
  scheduleFrame();
});

// Use native touch scrolling for iOS momentum/inertia.
// This preserves the "swipe and glide" behavior users expect.
outer.addEventListener('touchstart', () => {
  cancelAutoScrollTarget();
}, { passive: true });
outer.addEventListener('wheel', () => {
  cancelAutoScrollTarget();
}, { passive: true });

// ── Slider thumb drag guards ──
sliderEl.addEventListener('mousedown',  () => { sliderDriving = true; });
sliderEl.addEventListener('touchstart', () => { sliderDriving = true; }, { passive: true });
document.addEventListener('mouseup',   () => { sliderDriving = false; });
document.addEventListener('touchend',  () => { sliderDriving = false; });

function updateSliderThumbState() {
  const loopMs = 2600; // full left→right sweep duration
  const t = performance.now();
  const phase = (t % loopMs) / loopMs; // 0..1 repeating
  const moonX = 14 + (phase * 72);     // left edge to right edge
  // Fade in/out so restart at left is visually seamless
  const eclipseStrength = Math.pow(Math.sin(Math.PI * phase), 0.9);
  const coronaAlpha = 0.26 + (eclipseStrength * 0.18);

  sliderEl.style.setProperty('--eclipse-phase', eclipseStrength.toFixed(3));
  sliderEl.style.setProperty('--moon-x', moonX.toFixed(2) + '%');
  sliderEl.style.setProperty('--moon-alpha', eclipseStrength.toFixed(3));
  sliderEl.style.setProperty('--corona-alpha', coronaAlpha.toFixed(3));
}

function animateSliderThumb() {
  updateSliderThumbState();
  requestAnimationFrame(animateSliderThumb);
}
requestAnimationFrame(animateSliderThumb);

// ── Slider input → scroll ──
sliderEl.addEventListener('input', () => {
  cancelAutoScrollTarget();
  // Direct drag: instant scroll + instant line update — no lerp, no lag
  const max = outer.scrollWidth - outer.clientWidth;
  const pct = parseFloat(sliderEl.value);
  outer.scrollLeft = (pct / 100) * max;
  sliderEl.style.setProperty('--p', pct.toFixed(2) + '%');
  updateProjection();   // synchronous — line moves with thumb, same frame
});

const projLine    = document.getElementById('proj-line');
const eraLabels   = document.querySelectorAll('.era-lbl');
const yrMarks     = document.querySelectorAll('.yr-mark');
const ticks       = document.querySelectorAll('.tick');
const SNAP_PX     = 120;  // px radius around line within which eras "pop"
const CANVAS_H    = 860;
const AXIS_TOP    = 410;  // px from canvas top
// Set axis % variable once
projLine.style.setProperty('--ay', ((AXIS_TOP / CANVAS_H) * 100).toFixed(2) + '%');

// Each era element stores its canvas-x for hit-testing
eraLabels.forEach((el, i) => el.dataset.x = ERAS[i].x);
yrMarks.forEach((el,  i) => el.dataset.x = ERAS[i].x);
ticks.forEach((el,    i) => el.dataset.x = ERAS[i].x);

// Book elements for projection hit-testing (populated after canvas build)
const bookEls = () => document.querySelectorAll('.bk');
// Tighter snap for books — exactly the line crossing the cover width (54px each side)
const BOOK_SNAP = 60;  // half cover width = 54px, give 6px grace
const DEFAULT_RAY_RGB = '201,168,76';
let lastRayBookIdx = null;
let rayPulseTimer = null;

function hexToRgbTriplet(hex) {
  if (!hex || typeof hex !== 'string') return DEFAULT_RAY_RGB;
  const cleaned = hex.trim().replace('#', '');
  if (!/^[0-9a-fA-F]{6}$/.test(cleaned)) return DEFAULT_RAY_RGB;
  const r = parseInt(cleaned.slice(0, 2), 16);
  const g = parseInt(cleaned.slice(2, 4), 16);
  const b = parseInt(cleaned.slice(4, 6), 16);
  return `${r},${g},${b}`;
}

function triggerProjectionRayPulse() {
  projLine.classList.remove('ray-pulse');
  // Force reflow so the animation can restart on repeated crossings
  void projLine.offsetWidth;
  projLine.classList.add('ray-pulse');
  clearTimeout(rayPulseTimer);
  rayPulseTimer = setTimeout(() => projLine.classList.remove('ray-pulse'), 620);
}

function updateProjection() {
  // Canvas-x that aligns with the center of the viewport
  // With dynamic side padding = clientWidth/2, canvas x=0 aligns to screen center at scrollLeft=0
  // So canvas-x under the screen center = scrollLeft exactly
  const lineX = outer.scrollLeft;
  projLine.style.left = lineX + 'px';

  // Highlight eras within SNAP_PX
  eraLabels.forEach(el => {
    el.classList.toggle('near', Math.abs(Number(el.dataset.x) - lineX) < SNAP_PX);
  });
  yrMarks.forEach(el => {
    el.classList.toggle('near', Math.abs(Number(el.dataset.x) - lineX) < SNAP_PX);
  });
  ticks.forEach(el => {
    el.classList.toggle('near', Math.abs(Number(el.dataset.x) - lineX) < SNAP_PX);
  });

  let closestBook = null;
  let closestDist = Infinity;
  // Highlight books whose center x is crossed by the line
  bookEls().forEach(bk => {
    if (bk.classList.contains('faded')) {
      bk.classList.remove('near');
      return;
    }
    const dist = Math.abs(Number(bk.dataset.x) - lineX);
    bk.classList.toggle('near', dist < BOOK_SNAP);
    if (dist < closestDist) {
      closestDist = dist;
      closestBook = bk;
    }
  });

  if (closestBook && closestDist < BOOK_SNAP) {
    const planetColor = PLANETS[closestBook.dataset.planet]?.color || '#c9a84c';
    projLine.style.setProperty('--ray-rgb', hexToRgbTriplet(planetColor));
    const bookIdx = Number.parseInt(closestBook.dataset.bookIdx || '', 10);
    if (!Number.isNaN(bookIdx) && bookIdx !== lastRayBookIdx) {
      lastRayBookIdx = bookIdx;
      triggerProjectionRayPulse();
    }
  } else {
    projLine.style.setProperty('--ray-rgb', DEFAULT_RAY_RGB);
    lastRayBookIdx = null;
  }
}

// ── Unified render frame ──
// One rAF handles everything: apply slider target → read scrollLeft → update UI
// ── Smooth lerp scroll target ──
// sliderTarget: where we want to scroll to (-1 = not active)
// lerpActive:   true while we're animating toward sliderTarget
let lerpActive = false;
const LERP = 0.18; // fraction to close each frame — higher = snappier, lower = smoother

function scheduleFrame() {
  if (rafPending) return;
  rafPending = true;
  requestAnimationFrame(renderFrame);
}

function renderFrame() {
  rafPending = false;

  // Programmatic lerp (planet filter, EARLIER/LATER) — smooth ease-out
  if (sliderTarget >= 0) {
    const dist = sliderTarget - outer.scrollLeft;
    if (Math.abs(dist) < 0.5) {
      outer.scrollLeft = sliderTarget;
      sliderTarget = -1;
      lerpActive = false;
    } else {
      outer.scrollLeft += dist * LERP;
      lerpActive = true;
      rafPending = true;
      requestAnimationFrame(renderFrame);
    }
  } else {
    lerpActive = false;
  }

  const max    = outer.scrollWidth - outer.clientWidth;
  const scroll = outer.scrollLeft;
  const pct    = max > 0 ? (scroll / max) * 100 : 0;

  // Sync slider value to scroll (not when user is dragging thumb — thumb leads)
  if (!sliderDriving) {
    sliderEl.value = String(pct);
    sliderEl.style.setProperty('--p', pct.toFixed(2) + '%');
  }
  // When slider IS driving: --p is already set directly in the input handler

  // Projection line — always reads live scrollLeft, zero lag
  updateProjection();
}

// Native scroll → sync slider (skip during programmatic lerp)
outer.addEventListener('scroll', () => {
  if (lerpActive) return;
  scheduleFrame();
}, { passive: true });

renderFrame();

// EARLIER / LATER jump buttons
document.getElementById('btn-earlier').addEventListener('click', () => {
  sliderTarget = 0;
  scheduleFrame();
});
document.getElementById('btn-later').addEventListener('click', () => {
  sliderTarget = outer.scrollWidth - outer.clientWidth;
  scheduleFrame();
});

// ─────────────────────────────────────────────
// INITIALIZE LOCALIZATION
// ─────────────────────────────────────────────
// Add event listeners to hardcoded language buttons
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const lang = btn.getAttribute('data-lang');
    setLanguage(lang);
  });
});

updateLanguageSelector();
applyTranslations();
</script>
